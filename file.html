<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome My World</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at center, #ff9a9e, #fad0c4, #fad0c4, #fbc2eb, #a6c1ee);
      background-size: 200% 200%;
      animation: moveBG 10s infinite alternate;
    }

    @keyframes moveBG {
      0% {background-position: left top;}
      100% {background-position: right bottom;}
    }

    h1 {
      font-size: 4em;
      font-family: 'Trebuchet MS', sans-serif;
      text-align: center;
      color: #fff;
    }

    /* Look 1: 3D Shadow */
    .look1 {
      text-shadow: 4px 4px 8px rgba(0,0,0,0.7);
    }

    /* Look 2: Neon Glow */
    .look2 {
      color: #fff;
      text-shadow: 0 0 10px #00f, 0 0 20px #0ff, 0 0 30px #0ff;
    }

    /* Look 3: Metallic Gradient */
    .look3 {
      background: linear-gradient(45deg, #ffd700, #c0c0c0, #ff4500);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <!-- Change class to look1, look2, or look3 -->
  <h1 class="look1">Welcome My World</h1>
</body>
</html>
